# Replace app.example.com and www.app.example.com before enabling this file.
# Point both names to this proxy. Enable and reload this HTTP configuration
# before running Certbot so its Nginx installer selects the www redirect block
# instead of an unrelated default server. Then issue one certificate:
# certbot --nginx -d app.example.com -d www.app.example.com --redirect
# Certbot adds HTTPS and the apex HTTP-to-HTTPS redirect. The dedicated www
# server below remains the canonical redirect for both HTTP and HTTPS.
# APP_PORT in the GitHub Environment must match the upstream port below.

upstream film_front {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.app.example.com;

    return 301 https://app.example.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.example.com;

    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    client_max_body_size 1m;
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    location ^~ /_nuxt/ {
        proxy_pass http://film_front;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    location ~* ^/(images/|android-chrome-|apple-touch-icon|favicon|safari-pinned-tab) {
        proxy_pass http://film_front;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=604800" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    location / {
        proxy_pass http://film_front;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;

        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
