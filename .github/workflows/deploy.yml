name: Build & Deploy

on:
  push:
    branches:
      - dev
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - production
      release_tag:
        description: Existing semver tag for a production deployment (for example v1.2.3)
        required: false
        type: string

concurrency:
  group: film-front-${{ github.event_name == 'release' && 'production' || (github.event_name == 'workflow_dispatch' && inputs.environment || 'dev') }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    name: Prepare deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.deployment.outputs.environment }}
      image_name: ${{ steps.deployment.outputs.image_name }}
      image_tag: ${{ steps.deployment.outputs.image_tag }}
      release_version: ${{ steps.deployment.outputs.release_version }}
    steps:
      - name: Resolve environment and image tags
        id: deployment
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_ENVIRONMENT: ${{ inputs.environment }}
          MANUAL_RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          image_name="${REGISTRY}/${REPOSITORY,,}"

          if [[ "$EVENT_NAME" == "release" ]]; then
            environment="production"
            source_tag="$RELEASE_TAG"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" && "$MANUAL_ENVIRONMENT" == "production" ]]; then
            environment="production"
            source_tag="$MANUAL_RELEASE_TAG"
          else
            environment="dev"
            source_tag=""
          fi

          if [[ "$environment" == "production" ]]; then
            if [[ ! "$source_tag" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Production deployment requires a semver tag such as v1.2.3" >&2
              exit 1
            fi
            release_version="${source_tag#v}"
            image_tag="$release_version"
          else
            release_version=""
            image_tag="dev"
          fi

          echo "environment=$environment" >> "$GITHUB_OUTPUT"
          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"

  quality:
    name: Test, typecheck, lint & build
    runs-on: ubuntu-latest
    needs: prepare
    env:
      HUSKY: 0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.environment == 'production' && inputs.release_tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run contract and unit tests
        run: npm test

      - name: Check types
        run: npm run typecheck

      - name: Check lint
        run: npm run lint:check

      - name: Build application
        run: npm run build

      - name: Check production SEO responses
        run: npm run test:seo

  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs:
      - prepare
      - quality
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.environment == 'production' && inputs.release_tag || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.image_name }}
          tags: |
            type=raw,value=dev,enable=${{ needs.prepare.outputs.environment == 'dev' }}
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.release_version }},enable=${{ needs.prepare.outputs.environment == 'production' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.release_version }},enable=${{ needs.prepare.outputs.environment == 'production' }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.environment == 'production' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ needs.prepare.outputs.environment }}
          cache-to: type=gha,mode=max,scope=${{ needs.prepare.outputs.environment }}

  deploy:
    name: Deploy to ${{ needs.prepare.outputs.environment }}
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-and-push
    environment: ${{ needs.prepare.outputs.environment }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -eu

            IMAGE="${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.image_tag }}"
            CONTAINER_NAME="${{ vars.CONTAINER_NAME }}"
            HOST_PORT="${{ vars.APP_PORT }}"

            : "${CONTAINER_NAME:?GitHub Environment variable CONTAINER_NAME is required}"
            : "${HOST_PORT:?GitHub Environment variable APP_PORT is required}"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
            docker pull "$IMAGE"
            docker stop "$CONTAINER_NAME" 2>/dev/null || true
            docker rm "$CONTAINER_NAME" 2>/dev/null || true
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --log-opt max-size=10m \
              --log-opt max-file=5 \
              -p "${HOST_PORT}:3000" \
              -e NUXT_PUBLIC_API_URL="${{ vars.API_URL }}" \
              -e NUXT_PUBLIC_SOCKET_URL="${{ vars.SOCKET_URL }}" \
              -e NUXT_PUBLIC_GOOGLE_CLIENT_ID="${{ vars.GOOGLE_CLIENT_ID }}" \
              -e NUXT_PUBLIC_COOKIE_ATE="${{ vars.COOKIE_ACCESS_TOKEN_EXP }}" \
              -e NUXT_PUBLIC_COOKIE_RTE="${{ vars.COOKIE_REFRESH_TOKEN_EXP }}" \
              -e NUXT_PUBLIC_SITE_URL="${{ vars.SITE_URL }}" \
              -e NUXT_PUBLIC_LEGAL_EMAIL="${{ vars.LEGAL_EMAIL }}" \
              -e NUXT_PUBLIC_YANDEX_METRIKA_ID="${{ vars.YANDEX_METRIKA_ID }}" \
              -e NUXT_PUBLIC_ANALYTICS_ENVIRONMENT="${{ needs.prepare.outputs.environment }}" \
              -e NUXT_PUBLIC_DEPLOYMENT_ENVIRONMENT="${{ needs.prepare.outputs.environment }}" \
              "$IMAGE"

            sleep 3
            if [ "$(docker inspect --format '{{.State.Running}}' "$CONTAINER_NAME")" != "true" ]; then
              docker logs "$CONTAINER_NAME"
              exit 1
            fi
            docker image prune -f
